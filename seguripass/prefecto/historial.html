<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeguriPass - Historial</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand"><img src="../logo.png" alt="Logo" style="height:34px;"> SeguriPass</div>
    <div class="navbar-user">
      <span id="nav-usuario-rol" style="font-size:0.75rem;opacity:0.7;"></span>
      <span id="nav-usuario" style="font-weight:600;"></span>
      <a href="../login.html" class="btn-logout" onclick="sessionStorage.clear()">Cerrar Sesión</a>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li><a href="dashboard.html"><span class="icon">🏠</span> Inicio</a></li>
        <li><a href="solicitudes.html"><span class="icon">📋</span> Solicitudes</a></li>
        <li><a href="historial.html" class="active"><span class="icon">📜</span> Historial</a></li>
        <li><a href="reportes.html"><span class="icon">📊</span> Reportes</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <h2 style="color:var(--vino);margin-bottom:20px;">📜 Historial de Accesos</h2>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Todos los Registros</span>
          <span id="contador" style="font-size:0.85rem;color:var(--gris-texto);"></span>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Identificación</th>
                <th>Motivo</th>
                <th>Área</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Prefecto</th>
              </tr>
            </thead>
            <tbody id="tablaHistorial">
              <tr><td colspan="8" style="text-align:center;padding:20px;color:var(--gris-texto);">Sin registros</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/validaciones.js"></script>
  <script src="../js/notificaciones.js"></script>
  <script>
    const usuario = sessionStorage.getItem('sp_usuario');
    if (!usuario) window.location.href = '../login.html';
    document.getElementById('nav-usuario').textContent = usuario || 'Prefecto';
    document.getElementById('nav-usuario-rol').textContent = sessionStorage.getItem('sp_rol') || '';
    iniciarNotificaciones('prefecto');

    function cargarHistorial() {
      const solicitudes = JSON.parse(localStorage.getItem('sp_solicitudes') || '[]').reverse();
      document.getElementById('contador').textContent = `${solicitudes.length} registro(s)`;

      const tbody = document.getElementById('tablaHistorial');
      if (solicitudes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--gris-texto);">Sin registros</td></tr>';
        return;
      }

      tbody.innerHTML = solicitudes.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${s.nombre_completo}</td>
          <td>${s.identificacion}</td>
          <td>${s.motivo}</td>
          <td>${s.area}</td>
          <td>${s.fecha}</td>
          <td><span class="badge badge-${s.estado.toLowerCase()}">${s.estado}</span></td>
          <td>${s.prefecto || '—'}</td>
        </tr>
      `).join('');
    }

    cargarHistorial();
  </script>
</body>
</html>
