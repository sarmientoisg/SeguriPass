<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeguriPass - Selección de Rol</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="rol-page">
    <div class="rol-titulo">
      <img src="logo.png" alt="SeguriPass" style="height:70px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;">
      SeguriPass
      <span>Sistema de Control de Acceso — CETis 132</span>
    </div>

    <div class="rol-cards">
      <!-- Visitante -->
      <a href="visitante/registro.html" class="rol-card">
        <div class="rol-icon">🧑‍💼</div>
        <div class="rol-nombre">Visitante</div>
        <div class="rol-desc">Registrar solicitud de acceso al plantel</div>
      </a>

      <!-- Prefecto / Admin -->
      <a href="login.html" class="rol-card">
        <div class="rol-icon">👮</div>
        <div class="rol-nombre">Prefecto / Admin</div>
        <div class="rol-desc">Iniciar sesión en el sistema de gestión</div>
      </a>
    </div>
  </div>
</body>
</html>
